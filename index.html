<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- viewport-fit=cover: lets the page's own layout extend into the iOS safe area
    (notch/status bar, home indicator) instead of iOS reserving a plain white/black
    strip there. Required for apple-mobile-web-app-status-bar-style="black-translucent"
    below to actually show *our* background instead of a fixed OS color — see
    src/App.svelte / TopAppBar.svelte for the matching safe-area padding. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- iOS standalone (Home Screen) status bar. This meta tag is read once from the
    static HTML response when the OS chrome launches the app — mutating it via JS at
    runtime is silently ignored (confirmed: switching it per-theme in the boot script
    never took effect). "black-translucent" is the only style that stays theme-correct
    without that limitation: it makes the status bar transparent and lets our own page
    background (which *is* live/reactive to the `dark` class) show through underneath. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Regular Safari tab chrome tint. iOS only reliably honors theme-color when given
    as static media-queried pairs like this (a single tag mutated via JS was found to be
    ignored) — so this tracks the OS-level light/dark setting, not this app's in-page
    theme toggle. If a trainer manually overrides the in-app theme away from their OS
    setting, the Safari chrome color may not match; there's no reliable way around that
    given iOS's static-only reading of these tags. -->
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <title>InstantBogenturnier</title>
    <script>
      document.documentElement.classList.toggle(
        'dark',
        localStorage.theme === 'dark' ||
          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
      );
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
