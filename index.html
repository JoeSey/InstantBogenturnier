<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- iOS PWA status bar: "black-translucent" lets the app draw its own background
    under the status bar instead of a fixed white/black bar, so it can match whichever
    theme (light/dark) is active rather than always showing a white bar in dark mode. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Tinted by the inline boot script below (and by theme.svelte.ts on toggle) to
    match the light/dark app background — this is what iOS/Android use to color the
    browser/PWA chrome (address bar, status bar) around the page content. -->
    <meta id="theme-color-meta" name="theme-color" content="#f8fafc" />
    <title>InstantBogenturnier</title>
    <script>
      var isDark =
        localStorage.theme === 'dark' ||
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', isDark);
      document
        .getElementById('theme-color-meta')
        .setAttribute('content', isDark ? '#0f172a' : '#f8fafc');
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
